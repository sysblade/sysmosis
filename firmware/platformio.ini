[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

; LittleFS partition for static web files
board_build.filesystem = littlefs

build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    ; HD44780 I2C LCD
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    ; Web server + JSON
    mathieucarbou/ESP Async WebServer @ ^3.0.0
    bblanchon/ArduinoJson @ ^7.2.0
